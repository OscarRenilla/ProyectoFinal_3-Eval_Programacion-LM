<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Galería de Coches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark sticky-top galeria-navbar px-3">
    <a class="navbar-brand fw-bold fs-4" href="index.html">
        <i class="bi bi-car-front-fill me-2"></i>Mi Galería
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">
        <div id="divInicioBtn" class="d-flex align-items-center ms-auto gap-2 flex-wrap">
            <div id="barraBusqueda" class="input-group">
                <input type="text" id="buscador" class="form-control buscador-input" title="Barra de búsqueda"
                       placeholder="Buscar por marca de coche...">
                <button class="btn btn-buscar" id="btnBuscar" title="Buscar">
                    <i class="bi bi-search"></i>
                </button>
                <button class="btn btn-reset" id="btnReset" title="Borrar">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <select id="selectorTema" class="form-select selector-tema" title="Selector de tema">
                <option value="claro">☀️ Claro</option>
                <option value="oscuro">🌙 Oscuro</option>
                <option value="personalizado">🎨 Personalizado</option>
            </select>

            <button id="btnNuevaTarjeta" class="btn btn-nueva" title="Nueva tarjeta"
                    data-bs-toggle="modal" data-bs-target="#modalCrear">
                <i class="bi bi-plus-circle me-1"></i>Nueva tarjeta
            </button>
        </div>
    </div>
</nav>

<main class="galeria-main py-4 px-3" id="galeriaMain">
    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Cargando tarjetas...</p>
    </div>
    <div id="galeria" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-4"></div>
    <div id="sinResultados" class="text-center py-5 d-none">
        <i class="bi bi-search fs-1 text-muted"></i>
        <p class="mt-2 text-muted">No se encontraron tarjetas.</p>
    </div>
</main>

<footer class="galeria-footer py-3 px-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span class="fw-bold">Contacta con nosotros:</span>
        <ul class="list-unstyled d-flex gap-3 mb-0">
            <li><a href="https://instagram.com" target="_blank" class="footer-link"><i class="bi bi-instagram fs-4"></i></a>
            </li>
            <li><a href="https://facebook.com" target="_blank" class="footer-link"><i
                    class="bi bi-facebook fs-4"></i></a></li>
            <li><a href="https://x.com" target="_blank" class="footer-link"><i class="bi bi-twitter-x fs-4"></i></a>
            </li>
            <li><a href="https://linkedin.com" target="_blank" class="footer-link"><i
                    class="bi bi-linkedin fs-4"></i></a></li>
            <li><a href="https://tiktok.com" target="_blank" class="footer-link"><i class="bi bi-tiktok fs-4"></i></a>
            </li>
            <li><a href="https://youtube.com" target="_blank" class="footer-link"><i class="bi bi-youtube fs-4"></i></a>
            </li>
        </ul>
        <p class="mb-0 small">&copy; 2026 — Proyecto Final 2ª Eval — Óscar Renilla</p>
    </div>
</footer>

<div class="modal fade" id="modalCrear" tabindex="-1" aria-labelledby="modalCrearLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content galeria-modal">
            <div class="modal-header">
                <h5 class="modal-title" id="modalCrearLabel">
                    <i class="bi bi-plus-circle me-2"></i>Nueva Tarjeta
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="nuevoTitulo" class="form-label">Título</label>
                    <input type="text" id="nuevoTitulo" class="form-control" placeholder="Ej: Ferrari">
                </div>
                <div class="mb-3">
                    <label for="nuevoTexto" class="form-label">Descripción</label>
                    <textarea id="nuevoTexto" class="form-control" rows="3"
                              placeholder="Ej: Ferrari 488 GTB — deportivo italiano de lujo"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">
                    <i class="bi bi-x me-1"></i>Cancelar
                </button>
                <button type="button" class="btn btn-confirmar" id="btnCrear">
                    <i class="bi bi-check2 me-1"></i>Crear
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="modalEditarLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content galeria-modal">
            <div class="modal-header">
                <h5 class="modal-title" id="modalEditarLabel">
                    <i class="bi bi-pencil-square me-2"></i>Editar Tarjeta
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editarId">
                <div class="mb-3">
                    <label for="editarTitulo" class="form-label">Título</label>
                    <input type="text" id="editarTitulo" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="editarTexto" class="form-label">Descripción</label>
                    <textarea id="editarTexto" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">
                    <i class="bi bi-x me-1"></i>Cancelar
                </button>
                <button type="button" class="btn btn-confirmar" id="btnGuardarEdicion">
                    <i class="bi bi-floppy me-1"></i>Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalEliminar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content galeria-modal">
            <div class="modal-header">
                <h5 class="modal-title text-danger">
                    <i class="bi bi-trash3 me-2"></i>Eliminar
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>¿Seguro que quieres eliminar la tarjeta <strong id="eliminarNombre"></strong>?</p>
            </div>
            <div class="modal-footer">
                <input type="hidden" id="eliminarId">
                <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-peligro" id="btnConfirmarEliminar">
                    <i class="bi bi-trash3 me-1"></i>Eliminar
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalTema" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content galeria-modal">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-palette me-2"></i>Personalizar
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Color Navbar / Footer</label>
                    <input type="color" id="colorNavbar" class="form-control form-control-color w-100" value="#1a6ab1">
                </div>
                <div class="mb-3">
                    <label class="form-label">Color Fondo Principal</label>
                    <input type="color" id="colorMain" class="form-control form-control-color w-100" value="#eaf4ff">
                </div>
                <div class="mb-3">
                    <label class="form-label">Color Tarjetas</label>
                    <input type="color" id="colorTarjeta" class="form-control form-control-color w-100" value="#ffffff">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-confirmar" id="btnAplicarTema">
                    <i class="bi bi-check2 me-1"></i>Aplicar
                </button>
            </div>
        </div>
    </div>
</div>

<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
    <div id="toastMensaje" class="toast align-items-center text-white border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastTexto"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="scripts/script.js"></script>
</body>
</html>
